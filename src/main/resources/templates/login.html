<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Login" required />
        <input type="password" name="password" placeholder="Senha" required />
        <button type="submit">Entrar</button>
    </form>

    <span class="link" onclick="abrirPrimeiroAcesso()">Primeiro acesso</span>

    <div id="primeiro-acesso" style="display:none;">
        <h3>Criar conta</h3>

        <input type="text" id="cpf" placeholder="CPF" />
        <input type="text" id="nome" placeholder="Nome" />
        <input type="text" id="login" placeholder="Login" />
        <input type="password" id="senha" placeholder="Senha" />

        <!-- 🔹 Select para setor -->
        <select id="setor" required>
            <option value="">Selecione o setor</option>
        </select>

        <button onclick="criarConta()">Criar</button>
    </div>

</div>

<script>
function abrirPrimeiroAcesso() {
    document.getElementById("primeiro-acesso").style.display = "block";
    carregarSetores(); // carregar setores quando abrir
}

// 🔹 Carregar setores ativos do backend
async function carregarSetores() {
    try {
        const response = await fetch("/sectors/active");
        const setores = await response.json();
        const select = document.getElementById("setor");
        select.innerHTML = '<option value="">Selecione o setor</option>'; // reset
        setores.forEach(s => {
            const option = document.createElement("option");
            option.value = s.id;
            option.text = s.name;
            select.appendChild(option);
        });
    } catch (e) {
        console.error(e);
        alert("Erro ao carregar setores");
    }
}

// 🔹 Criar conta com setor
async function criarConta() {
    const setorId = document.getElementById("setor").value;
    if (!setorId) {
        alert("Selecione um setor");
        return;
    }

    try {
        const response = await fetch("/auth/first-access", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                cpf: document.getElementById("cpf").value.replace(/\D/g, ""),
                name: document.getElementById("nome").value,
                login: document.getElementById("login").value,
                password: document.getElementById("senha").value,
                sectorId: setorId // 🔹 envio do setor
            })
        });

        const data = await response.json();

        if (response.ok) {
            alert("Conta criada com sucesso!");
            location.reload();
        } else {
            alert(data.error || "Erro ao criar conta");
        }

    } catch (e) {
        console.error(e);
        alert("Erro ao conectar com o servidor");
    }
}
</script>

</body>
</html>

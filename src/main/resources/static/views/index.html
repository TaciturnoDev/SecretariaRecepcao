<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Recepção - SDE</title>

    <!-- ================= CSS ================= -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- ===================================================== -->
<!--  BANNER / TOPO -->
<!-- ===================================================== -->
<div class="banner">

    <img src="/imagens/desenvolvimento_economico.png" alt="Logo">

    <div class="user-container">
        <span id="loggedUserName" class="logged-user-name"></span>

        <div class="user-icon" id="userIcon">
            👤
        </div>

        <button onclick="logout()">Sair</button>
    </div>

</div>


<!-- ===================================================== -->
<!--  SIDEBAR -->
<!-- ===================================================== -->
<div id="sidebar" class="sidebar">

	<div class="sidebar-toggle" onclick="toggleSidebar()">
	    ☰
	</div>
	
    <div class="sidebar-top">
        <h2>Menu</h2>
    </div>

	<ul class="sidebar-menu">

	    <li>
	        <a href="/views/index.html" class="menu-link active">
	            <i>📋</i>
	            <span>Tarefas</span>
	        </a>
	    </li>

	    <li>
	        <a href="/views/setores.html" class="menu-link">
	            <i>🏢</i>
	            <span>Setores</span>
	        </a>
	    </li>

	    <li>
	        <a href="#" class="menu-link">
	            <i>📅</i>
	            <span>Eventos</span>
	        </a>
	    </li>

	    <li>
	        <a href="#" class="menu-link">
	            <i>📊</i>
	            <span>Dashboard</span>
	        </a>
	    </li>

	    <li>
	        <a href="/views/admin.html" class="menu-link">
	            <i>🛡️</i>
	            <span>Super Admin</span>
	        </a>
	    </li>

	</ul>

</div>

<!-- ===================================================== -->
<!-- 🧱 CONTEÚDO -->
<!-- ===================================================== -->
<div class="page-container">

    <main class="content">

        <div class="form-card">
            <h2>Nova Tarefa</h2>

            <input id="title" placeholder="Título">
			<textarea
			    id="description"
			    placeholder="Descrição"
			    maxlength="1000"
				rows="1"
			></textarea>

            <select id="status">
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>

			
			<!-- ================= PRIORIDADE ================= -->
			  <select id="priority">
			     <option value="LOW">Pequena</option>
	             <option value="MEDIUM" selected>Média</option>
			     <option value="HIGH">Alta</option>
				 <option value="URGENT">Urgente</option>
               </select>
								  
								  
            <button id="submitBtn" onclick="createTask()">Criar</button>
        </div>


        <div class="task-filters">

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar por nome, descrição ou CPF"
                oninput="aplicarFiltros()"
            >

            <select id="filterStatus" onchange="aplicarFiltros()">
                <option value="ALL">Todos</option>
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>

            <select id="sectorSelect" onchange="aplicarFiltros()" style="display:none;">
                <option value="ALL">Todos os setores</option>
            </select>
			
			

        </div>

		
		
        <select id="filterUser" onchange="aplicarFiltros()">
            <option value="ALL">Todos os usuários</option>
        </select>
		
	

        <div id="loading" class="loading" style="display:none;">
            Carregando tarefas...
        </div>

        <div class="dashboard">
            <div>Total: <span id="totalTasks"></span></div>
            <div>Pendentes: <span id="pendingTasks"></span></div>
            <div>Em andamento: <span id="progressTasks"></span></div>
            <div>Concluídas: <span id="doneTasks"></span></div>
        </div>

		
		<!-- ============ TAREFAS =================-->
        <div class="tasks-header">
            <h2>Tarefas</h2>
            <div id="paginationTop" class="pagination inline"></div>
        </div>

        <ul id="taskList"></ul>

        <div id="paginationBottom" class="pagination"></div>

    </main>

</div>


<!-- ===================================================== -->
<!-- JS -->
<!-- ===================================================== -->
<script src="/js/app.js"></script>


</body>
</html>

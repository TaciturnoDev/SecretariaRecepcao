<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Super Admin - SDE</title>

    <!-- CSS DO SISTEMA -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Bootstrap (tabelas) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ===================================================== -->
<!--  BANNER  -->
<!-- ===================================================== -->
<div class="banner">

    <img src="/imagens/desenvolvimento_economico.png" alt="Logo">

    <div class="user-container">
        <span id="loggedUserName" class="logged-user-name"></span>

        <div class="user-icon">
            👤
        </div>

        <button onclick="logout()">Sair</button>
    </div>

</div>

<!-- ===================================================== -->
<!-- SIDEBAR  -->
<!-- ===================================================== -->
<div id="sidebar" class="sidebar">

	<div class="sidebar-toggle" onclick="toggleSidebar()">
	    ☰
	</div>
	
	
	<div class="sidebar-top">
	    <h2>Menu</h2>
	</div>

	<ul class="sidebar-menu">

	    <li>
	        <a href="/views/index.html" class="menu-link">
	            <i>📋</i>
	            <span>Tarefas</span>
	        </a>
	    </li>

	    <li>
	        <a href="#" class="menu-link">
	            <i>🏢</i>
	            <span>Setores</span>
	        </a>
	    </li>

	    <li>
	        <a href="#" class="menu-link">
	            <i>📅</i>
	            <span>Eventos</span>
	        </a>
	    </li>

	    <li>
	        <a href="#" class="menu-link">
	            <i>📊</i>
	            <span>Dashboard</span>
	        </a>
	    </li>

	    <li>
	        <a href="/views/admin.html" class="menu-link active">
	            <i>🛡️</i>
	            <span>Super Admin</span>
	        </a>
	    </li>

	</ul>

	</div>

<!-- ===================================================== -->
<!--  CONTEÚDO  -->
<!-- ===================================================== -->
<div class="page-container">

    <main class="content">

        <h2>Painel de Administração</h2>

        <hr>

        <!-- USUÁRIOS -->
        <h4>Usuários</h4>
        <table class="table table-bordered" id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Role</th>
                    <th>Ativo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <hr>

        <!-- TAREFAS -->
        <h4>Tarefas</h4>
        <table class="table table-bordered" id="tasksTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Status</th>
                    <th>Usuário</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </main>

</div>

<!-- ===================================================== -->
<!-- JS -->
<!-- ===================================================== -->
<script src="/js/app.js"></script>
<script src="/js/admin.js"></script>



</body>
</html>

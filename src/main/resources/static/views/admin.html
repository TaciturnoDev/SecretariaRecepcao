<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Super Admin - SDE</title>

    <!-- CSS DO SISTEMA -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Bootstrap (tabelas) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ===================================================== -->
<!-- 🔶 BANNER (IGUAL INDEX) -->
<!-- ===================================================== -->
<div class="banner">

    <img src="/imagens/desenvolvimento_economico.png" alt="Logo">

    <div class="user-container">
        <span id="loggedUserName" class="logged-user-name"></span>

        <div class="user-icon">
            👤
        </div>

        <button onclick="logout()">Sair</button>
    </div>

</div>

<!-- ===================================================== -->
<!-- 🔷 SIDEBAR (IGUAL INDEX) -->
<!-- ===================================================== -->
<div id="sidebar" class="sidebar">

    <div class="sidebar-top">
        <h2>Menu</h2>
    </div>

    <ul class="sidebar-menu">

        <li onclick="goTo('tasks')">
            <i>📋</i>
            <span>Tarefas</span>
        </li>

        <li onclick="goTo('setores')">
            <i>🏢</i>
            <span>Setores</span>
        </li>

        <li onclick="goTo('eventos')">
            <i>📅</i>
            <span>Eventos</span>
        </li>

        <li onclick="goTo('dashboard')">
            <i>📊</i>
            <span>Dashboard</span>
        </li>

        <li onclick="goTo('admin')">
            <i>🛡️</i>
            <span>Super Admin</span>
        </li>

    </ul>

</div>

<!-- ===================================================== -->
<!-- 🧱 CONTEÚDO (ÚNICA PARTE QUE MUDA) -->
<!-- ===================================================== -->
<div class="page-container">

    <main class="content">

        <h2>Painel SuperAdmin</h2>

        <hr>

        <!-- USUÁRIOS -->
        <h4>Usuários</h4>
        <table class="table table-bordered" id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Login</th>
                    <th>Role</th>
                    <th>Ativo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <hr>

        <!-- TAREFAS -->
        <h4>Tarefas</h4>
        <table class="table table-bordered" id="tasksTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Status</th>
                    <th>Usuário</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </main>

</div>

<!-- ===================================================== -->
<!-- JS -->
<!-- ===================================================== -->
<script src="/js/app.js"></script>
<script src="/js/admin.js"></script>

<!-- NAVEGAÇÃO -->
<script>
function goTo(section) {

    if (section === "admin") {
        window.location.href = "/views/admin.html";
        return;
    }

    if (section === "tasks") {
        window.location.href = "/views/index.html";
        return;
    }

    if (section === "eventos") {
        alert("Eventos em desenvolvimento");
        return;
    }

    if (section === "dashboard") {
        alert("Dashboard em desenvolvimento");
        return;
    }

    if (section === "setores") {
        alert("Setores em desenvolvimento");
        return;
    }
}
</script>

</body>
</html>

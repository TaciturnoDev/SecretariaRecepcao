<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel SuperAdmin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Painel SuperAdmin</h2>

    <hr>

    <!-- USUÁRIOS -->
    <h4>Usuários</h4>
    <table class="table table-bordered" id="usersTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Login</th>
                <th>Role</th>
                <th>Ativo</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <hr>

    <!-- TAREFAS -->
    <h4>Tarefas</h4>
    <table class="table table-bordered" id="tasksTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Status</th>
                <th>Usuário</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="/js/admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recepção - SDE</title>

    <!-- CSS principal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HEADER INSTITUCIONAL ================= -->
<header class="header">
    <h1>Secretaria do Desenvolvimento Econômico</h1>
    <span>Sistema de Recepção e Atendimentos</span>
	
	<div class="user-container">

	    <span id="loggedUserName" class="logged-user-name"></span>

	    <div class="user-icon" id="userIcon">
	        👤
	    </div>

	    <div class="user-dropdown" id="userDropdown">
	        <input type="text" id="userNameInput" placeholder="Nome do funcionário" />
	        <button type="button" id="enterUserBtn">Entrar</button>
	    </div>

	</div>
</header>

<!-- ================= LAYOUT PRINCIPAL ================= -->
<div class="page-container">

    <!-- ================= ÁREA ÚTIL (ESQUERDA) ================= -->
    <main class="content">

        <!-- ================= FORMULÁRIO ================= -->
        <div class="form-card">
            <h2>Nova Tarefa</h2>

            <input id="title" placeholder="Título">
            <input id="description" placeholder="Descrição">

            <select id="status">
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>

            <button id="submitBtn" onclick="createTask()">Criar</button>
        </div>

        <!-- ================= BUSCA E FILTRO ================= -->
        <div class="task-filters">
            <input
                type="text"
                id="searchInput"
                placeholder="Buscar por nome, descrição ou CPF"
                oninput="aplicarFiltros()"
            >

            <select id="filterStatus" onchange="aplicarFiltros()">
                <option value="ALL">Todos</option>
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>
        </div>
		
		<select id="filterUser">
		    <option value="ALL">Todos os usuários</option>
		</select>

        <!-- =========== CARREGAR TAREFAS =============== -->
        <div id="loading" style="display:none;" class="loading">
            Carregando tarefas...
        </div>

        <!-- ================= LISTA DE TAREFAS ================= -->
        <div class="tasks-header">
            <h2>Tarefas</h2>
            <div id="paginationTop" class="pagination inline"></div>
        </div>

        <ul id="taskList"></ul>

        <div id="paginationBottom" class="pagination"></div>

    </main> <!-- ✅ FECHAMENTO CORRETO DO MAIN -->

    <!-- ================= BACKGROUND (DIREITA) ================= -->
    <aside class="background-image"></aside>

</div>

<!-- ================= JS ================= -->
<script src="app.js"></script>

</body>
</html>

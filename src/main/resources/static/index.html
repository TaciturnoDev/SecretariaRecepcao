<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Recepção - SDE</title>

    <!-- ================= CSS ================= -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===================================================== -->
<!-- 🔶 BANNER / TOPO -->
<!-- ===================================================== -->
<div class="banner">

    <!-- LOGO -->
    <img src="imagens/desenvolvimento_economico.png" alt="Logo">

    <!-- 🔷 USUÁRIO LOGADO -->
    <div class="user-container">
        <span id="loggedUserName" class="logged-user-name"></span>

        <div class="user-icon" id="userIcon">
            👤
        </div>
    </div>

</div>


<!-- ===================================================== -->
<!-- 🔷 SIDEBAR (MENU LATERAL) -->
<!-- ===================================================== -->
<div id="sidebar" class="sidebar">

    <!-- BOTÃO EXPANDIR / MINIMIZAR -->
    <button class="toggle-btn" onclick="toggleSidebar()">
        ☰
        <span class="text">Menu</span>
    </button>

    <div class="sidebar-content">

        <!-- HEADER -->
        <div class="sidebar-header">
            <h3>Setores</h3>
            <button onclick="abrirCriarSetor()">＋</button>
        </div>

        <!-- 🔍 BUSCA DE SETOR -->
        <input 
            type="text" 
            id="searchSetor" 
            placeholder="Buscar setor..."
            oninput="filtrarSetores()"
        />

        <!-- 📁 LISTA DE SETORES -->
        <ul id="lista-setores"></ul>

    </div>
</div>


<!-- ===================================================== -->
<!-- 🧱 LAYOUT PRINCIPAL -->
<!-- ===================================================== -->
<div class="page-container">

    <main class="content">

        <!-- ===================================================== -->
        <!-- 📝 FORMULÁRIO - NOVA TAREFA -->
        <!-- ===================================================== -->
        <div class="form-card">

            <h2>Nova Tarefa</h2>

            <input id="title" placeholder="Título">
            <input id="description" placeholder="Descrição">

            <select id="status">
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>

            <button id="submitBtn" onclick="createTask()">Criar</button>

        </div>


        <!-- ===================================================== -->
        <!-- 🔎 FILTROS -->
        <!-- ===================================================== -->
        <div class="task-filters">

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar por nome, descrição ou CPF"
                oninput="aplicarFiltros()"
            >

            <select id="filterStatus" onchange="aplicarFiltros()">
                <option value="ALL">Todos</option>
                <option value="PENDING">Pendente</option>
                <option value="IN_PROGRESS">Em andamento</option>
                <option value="COMPLETED">Concluída</option>
            </select>

        </div>

        <!-- FILTRO POR USUÁRIO -->
        <select id="filterUser">
            <option value="ALL">Todos os usuários</option>
        </select>


        <!-- ===================================================== -->
        <!-- ⏳ LOADING -->
        <!-- ===================================================== -->
        <div id="loading" class="loading" style="display:none;">
            Carregando tarefas...
        </div>


        <!-- ===================================================== -->
        <!-- 📊 DASHBOARD (SEPARADO DO HEADER) -->
        <!-- ===================================================== -->
        <div class="dashboard">
            <div>Total: <span id="totalTasks"></span></div>
            <div>Pendentes: <span id="pendingTasks"></span></div>
            <div>Em andamento: <span id="progressTasks"></span></div>
            <div>Concluídas: <span id="doneTasks"></span></div>
        </div>


        <!-- ===================================================== -->
        <!-- 📋 HEADER DA LISTA -->
        <!-- ===================================================== -->
        <div class="tasks-header">
            <h2>Tarefas</h2>
            <div id="paginationTop" class="pagination inline"></div>
        </div>


        <!-- ===================================================== -->
        <!-- 📌 LISTA DE TAREFAS -->
        <!-- ===================================================== -->
        <ul id="taskList"></ul>


        <!-- ===================================================== -->
        <!-- 🔢 PAGINAÇÃO -->
        <!-- ===================================================== -->
        <div id="paginationBottom" class="pagination"></div>

    </main>

</div>


<!-- ===================================================== -->
<!-- ⚙️ JS -->
<!-- ===================================================== -->
<script src="/js/app.js"></script>

</body>
</html>
